<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#0d1117" />
<link rel="manifest" href="/manifest.webmanifest" />
<title>PC AI Remote</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" />
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.4 system-ui, sans-serif; background: #0d1117; color: #c9d1d9; height: 100dvh; display: flex; flex-direction: column; }
  header { display: flex; gap: 6px; align-items: center; padding: 8px; background: #161b22; border-bottom: 1px solid #30363d; }
  header b { flex: 1; font-size: 13px; }
  button { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 6px 10px; font-size: 13px; }
  button.primary { background: #238636; border-color: #2ea043; }
  button.active { background: #1f6feb; border-color: #388bfd; }
  #tabs { display: flex; gap: 6px; overflow-x: auto; padding: 6px 8px; background: #0d1117; border-bottom: 1px solid #30363d; }
  #tabs button { white-space: nowrap; }
  #main { flex: 1; position: relative; overflow: hidden; }
  .view { position: absolute; inset: 0; display: none; flex-direction: column; }
  .view.show { display: flex; }
  #term { flex: 1; padding: 4px; }
  #optbar { display: flex; gap: 6px; padding: 6px 8px; background: #161b22; border-top: 1px solid #30363d; overflow-x: auto; }
  #optbar:empty { display: none; }
  .optbtn { background: #21262d; border: 1px solid #30363d; border-radius: 16px; padding: 6px 12px; font-size: 13px; color: #c9d1d9; white-space: nowrap; flex: none; }
  /* Claude-mobile-style composer */
  #inputbar { position: relative; display: flex; align-items: flex-end; gap: 8px; padding: 8px; background: #161b22; border-top: 1px solid #30363d; }
  #inputbar .box { flex: 1; display: flex; align-items: flex-end; gap: 4px; background: #0d1117; border: 1px solid #30363d; border-radius: 22px; padding: 2px 4px 2px 8px; }
  #msgInput { flex: 1; background: transparent; border: none; color: #c9d1d9; font: inherit; font-size: 15px; padding: 9px 4px; resize: none; max-height: 30vh; }
  #msgInput:focus { outline: none; }
  #inputbar .icon, #chatBar .icon { background: transparent; border: none; color: #8b949e; font-size: 17px; padding: 7px; border-radius: 50%; line-height: 1; }
  #inputbar .icon.rec, #chatBar .icon.rec { color: #fb6a3c; }
  #send, #chatSend { background: #fb6a3c; border: none; color: #fff; width: 42px; height: 42px; border-radius: 50%; font-size: 20px; font-weight: 600; flex: none; }
  #chatSend.stop { background: #e5534b; font-size: 16px; }
  #send:disabled, #chatSend:disabled { background: #30363d; color: #8b949e; }
  .grp { display: flex; align-items: center; gap: 4px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 2px 4px; }
  .grp label { color: #8b949e; font-size: 11px; }
  #screen img { width: 100%; height: 100%; object-fit: contain; }
  #home { padding: 12px; overflow: auto; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 10px; margin-bottom: 8px; display: flex; gap: 8px; align-items: center; }
  .card .grow { flex: 1; }
  .card small { color: #8b949e; display: block; }
  input, select { background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 6px; font-size: 13px; }
  dialog { background: #161b22; color: #c9d1d9; border: 1px solid #30363d; border-radius: 10px; width: min(94vw, 460px); }
  dialog h3 { margin: 0 0 8px; }
  .row { display: flex; gap: 6px; margin: 6px 0; align-items: center; }
  .row > * { min-width: 0; }
  #fsList { max-height: 40vh; overflow: auto; border: 1px solid #30363d; border-radius: 6px; }
  #fsList div { padding: 8px; border-bottom: 1px solid #21262d; }
  #fsList div:active { background: #21262d; }
  .pill { font-size: 11px; color: #8b949e; }
  /* skills + context bottom sheet */
  dialog.sheet { width: min(96vw, 520px); max-height: 82vh; }
  .tabs { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; }
  .tabs button.on { background: #1f6feb; border-color: #388bfd; }
  .search { width: 100%; margin-bottom: 6px; }
  .list { max-height: 58vh; overflow: auto; border: 1px solid #30363d; border-radius: 6px; }
  .list div { padding: 10px; border-bottom: 1px solid #21262d; display: flex; gap: 8px; align-items: center; }
  .list div:active { background: #21262d; }
  .src { margin-left: auto; font-size: 11px; color: #8b949e; }
  .list .seclabel { display: block; border: none; padding: 10px 6px 4px; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: #6e7681; }
  .crumbs { font-size: 12px; color: #8b949e; margin: 4px 0; word-break: break-all; }
  /* opencode chat view (Claude-mobile style) */
  #chatTop { display: flex; gap: 8px; align-items: center; padding: 8px; background: #161b22; border-bottom: 1px solid #30363d; }
  #chatTop button { background: #21262d; border: 1px solid #30363d; border-radius: 16px; padding: 6px 12px; font-size: 13px; color: #c9d1d9; white-space: nowrap; }
  #chatMsgs { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 85%; padding: 10px 13px; border-radius: 16px; white-space: pre-wrap; word-break: break-word; line-height: 1.45; }
  .msg.user { align-self: flex-end; background: #1f6feb; color: #fff; border-bottom-right-radius: 5px; }
  .msg.assistant { align-self: flex-start; background: #161b22; border: 1px solid #30363d; border-bottom-left-radius: 5px; }
  .toolcard { align-self: flex-start; max-width: 88%; font-size: 12px; color: #adbac7; background: #0d1117; border: 1px solid #30363d; border-radius: 10px; padding: 7px 11px; }
  .reason { align-self: flex-start; max-width: 88%; font-size: 12px; color: #6e7681; }
  .reason summary { cursor: pointer; list-style: none; }
  .reason summary::-webkit-details-marker { display: none; }
  .reason summary::before { content: "▸ "; }
  .reason[open] summary::before { content: "▾ "; }
  .reason .reasontext { font-style: italic; white-space: pre-wrap; margin-top: 4px; }
  .thinking { align-self: flex-start; color: #8b949e; font-size: 13px; }
  .att { align-self: flex-end; max-width: 60%; border-radius: 12px; border: 1px solid #30363d; }
  #chatBar { position: relative; padding: 8px; background: #161b22; border-top: 1px solid #30363d; }
  .acpop { position: absolute; left: 8px; right: 8px; bottom: calc(100% - 1px); max-height: 44vh; overflow-y: auto; background: #161b22; border: 1px solid #30363d; border-radius: 14px 14px 0 0; box-shadow: 0 -8px 24px rgba(0,0,0,.45); display: none; z-index: 50; }
  .acpop.show { display: block; }
  .acpop .achdr { padding: 8px 12px 4px; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: #6e7681; position: sticky; top: 0; background: #161b22; }
  .acpop .acitem { padding: 10px 12px; border-top: 1px solid #21262d; font-size: 14px; display: flex; gap: 6px; align-items: center; }
  .acpop .acitem.sel, .acpop .acitem:active { background: #1f6feb22; }
  .acpop .acd { color: #6e7681; font-size: 12px; }
  /* AI question bottom sheet */
  #qWrap { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none; z-index: 100; align-items: flex-end; }
  #qWrap.show { display: flex; }
  #qSheet { width: 100%; max-height: 82vh; overflow-y: auto; background: #161b22; border-top: 1px solid #30363d; border-radius: 20px 20px 0 0; padding: 16px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 -10px 30px rgba(0,0,0,.5); }
  .qhead { display: flex; align-items: center; gap: 8px; }
  .qhead .qh { font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: #8b949e; flex: 1; }
  .qpager { font-size: 12px; color: #8b949e; background: #21262d; border: 1px solid #30363d; border-radius: 10px; padding: 3px 9px; }
  .qq { font-size: 16px; line-height: 1.4; }
  #qBody { display: flex; flex-direction: column; gap: 8px; }
  .qopt { display: flex; gap: 10px; align-items: flex-start; padding: 11px 13px; border: 1px solid #30363d; border-radius: 12px; cursor: pointer; }
  .qopt.sel { border-color: #1f6feb; background: #1f6feb1f; }
  .qopt input { margin: 3px 0 0; flex: none; }
  .qopt .qol { font-size: 14px; }
  .qopt .qod { font-size: 12px; color: #8b949e; margin-top: 2px; }
  .qcustom { width: 100%; margin-top: 2px; }
  .qactions { display: flex; align-items: center; gap: 8px; padding-top: 4px; }
  #qNext { background: #fb6a3c; color: #fff; border: none; border-radius: 12px; padding: 11px 20px; font-size: 14px; font-weight: 600; }
  #qCancel { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 12px; padding: 11px 16px; font-size: 14px; }
  .composer { background: #0d1117; border: 1px solid #30363d; border-radius: 22px; padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }
  .composer-actions { display: flex; align-items: center; gap: 8px; overflow-x: auto; }
  #chatInput { width: 100%; background: transparent; border: none; color: #c9d1d9; font: inherit; font-size: 15px; padding: 4px 2px; resize: none; max-height: 30vh; }
  #chatInput:focus { outline: none; }
  .tool { display: inline-flex; align-items: center; gap: 7px; background: #21262d; border: 1px solid #30363d; border-radius: 8px; padding: 7px 12px; font-size: 13px; color: #c9d1d9; white-space: nowrap; flex: none; }
  .tool .ico { font-size: 15px; line-height: 1; opacity: .85; }
  #chatAtts { display: flex; gap: 10px; flex-wrap: wrap; padding: 2px 0; }
  #chatAtts:empty { display: none; }
  .attthumb { position: relative; width: 74px; height: 74px; border-radius: 14px; overflow: hidden; background: #21262d; border: 1px solid #30363d; flex: none; }
  .attthumb img { width: 100%; height: 100%; object-fit: cover; }
  .attthumb .attfile { display: flex; align-items: center; justify-content: center; height: 100%; padding: 6px; font-size: 11px; text-align: center; word-break: break-word; color: #adbac7; }
  .attthumb .attx { position: absolute; top: 3px; right: 3px; width: 22px; height: 22px; border-radius: 50%; border: none; background: rgba(0,0,0,.55); color: #fff; font-size: 12px; line-height: 1; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<header>
  <b>PC AI Remote</b>
  <button id="btnNew" class="primary">+ Session</button>
  <button data-view="screen">Screen</button>
  <button id="btnRust">RustDesk</button>
</header>
<div id="tabs"></div>
<div id="main">
  <div class="view show" id="home"></div>
  <div class="view" id="vSession">
    <div id="term"></div>
    <div id="optbar"></div>
    <div id="inputbar">
      <div id="acPopT" class="acpop"></div>
      <div class="box">
        <button class="icon" id="addBtn" title="Skills &amp; context">＋</button>
        <textarea id="msgInput" rows="1" placeholder="Message…"></textarea>
        <button class="icon" id="micBtn" title="Dictate">🎤</button>
      </div>
      <button id="send" title="Send">➤</button>
    </div>
  </div>
  <div class="view" id="screen"><img id="shot" alt="screen" /></div>
  <div class="view" id="vChat">
    <div id="chatTop">
      <button id="chatModelBtn">Model ▾</button>
      <span style="flex:1"></span>
      <button id="chatCli" title="Switch to terminal">⌨ CLI</button>
    </div>
    <div id="chatMsgs"></div>
    <div id="chatBar">
      <div id="acPop" class="acpop"></div>
      <div class="composer">
        <div id="chatAtts"></div>
        <textarea id="chatInput" rows="1" placeholder="Message opencode…"></textarea>
        <div class="composer-actions">
          <button class="tool" id="toolLibrary"><span class="ico">☰</span> Library</button>
          <button class="tool" id="toolContext"><span class="ico">☰</span> Context</button>
          <span style="flex:1"></span>
          <button class="icon" id="chatAddBtn" title="Attach">📎</button>
          <button class="icon" id="chatMic" title="Dictate">🎤</button>
          <button id="chatSend" title="Send">↑</button>
        </div>
      </div>
    </div>
  </div>
</div>
<input type="file" id="chatFile" accept="*/*" style="display:none" multiple />

<div id="qWrap">
  <div id="qSheet">
    <div class="qhead"><span id="qHeader" class="qh"></span><span id="qPager" class="qpager"></span></div>
    <div id="qQuestion" class="qq"></div>
    <div id="qBody"></div>
    <div class="qactions">
      <button id="qCancel">Cancel</button>
      <span style="flex:1"></span>
      <button id="qNext" class="primary">Next</button>
    </div>
  </div>
</div>

<dialog id="dlgNew">
  <h3>New session</h3>
  <div class="row"><input id="nName" placeholder="name (optional)" class="grow" /></div>
  <div class="row"><label>agent</label><select id="nAgent" class="grow"></select></div>
  <div class="row"><label>folder</label><span id="nPath" class="grow pill"></span></div>
  <div class="row"><button id="fsUp">⬆ up</button><input id="fsNew" placeholder="new folder name" class="grow" /><button id="fsMk">mkdir</button></div>
  <div id="fsList"></div>
  <div class="row" style="justify-content:flex-end"><button id="nCancel">Cancel</button><button id="nCreate" class="primary">Create</button></div>
</dialog>

<dialog id="dlgMenu" class="sheet">
  <div class="tabs"><b id="menuTitle"></b><span style="flex:1"></span><button id="menuClose">Close</button></div>
  <input id="menuSearch" class="search" placeholder="Search…" style="display:none" />
  <div id="menuList" class="list"></div>
</dialog>

<dialog id="dlgAdd" class="sheet">
  <div class="tabs">
    <button id="tabSkills" class="on">✦ Library</button>
    <button id="tabCtx">＠ Context</button>
    <span style="flex:1"></span>
    <button id="addClose">Done</button>
  </div>
  <div id="paneSkills">
    <input id="skSearch" class="search" placeholder="Search skills…" />
    <div id="skList" class="list"></div>
  </div>
  <div id="paneCtx" style="display:none">
    <div class="row"><button id="ctxUp">⬆ up</button><button id="ctxAddDir">＋ this folder</button></div>
    <div id="ctxCrumb" class="crumbs"></div>
    <div id="ctxList" class="list"></div>
  </div>
</dialog>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script>
const TOKEN = new URLSearchParams(location.search).get("token") || localStorage.getItem("token") || "";
if (TOKEN) localStorage.setItem("token", TOKEN);
const qs = (s) => document.querySelector(s);
const api = async (p, opt = {}) => {
  const sep = p.includes("?") ? "&" : "?";
  const r = await fetch(p + sep + "token=" + encodeURIComponent(TOKEN), {
    ...opt, headers: { "Content-Type": "application/json", ...(opt.headers || {}) },
  });
  if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || r.status);
  return r.ctHeaderJson === false ? r : r.json();
};

let agents = {};        // descriptors
let active = null;      // active session id
let activeSession = null; // active session meta object
let term, fit, ws;      // xterm + websocket for active session

// ---- views ----
function showView(id) {
  document.querySelectorAll(".view").forEach((v) => v.classList.toggle("show", v.id === id));
  if (id === "screen") startScreen(); else stopScreen();
  if (id !== "vChat") { hideAC(); stopEvents(); qs("#qWrap").classList.remove("show"); qReq = null; }
}
document.querySelectorAll("[data-view]").forEach((b) => b.onclick = () => showView(b.dataset.view));

// ---- home / session list ----
async function refresh() {
  const list = await api("/sessions");
  // tabs
  const tabs = qs("#tabs"); tabs.innerHTML = "";
  const home = document.createElement("button"); home.textContent = "≡ Sessions";
  home.onclick = () => showView("home"); tabs.appendChild(home);
  list.forEach((s) => {
    const b = document.createElement("button");
    b.textContent = (s.alive ? "● " : "○ ") + s.name;
    b.className = s.id === active ? "active" : "";
    b.onclick = () => openSession(s);
    tabs.appendChild(b);
  });
  // home cards
  const h = qs("#home"); h.innerHTML = "";
  if (!list.length) h.innerHTML = "<p class='pill'>No sessions. Tap “+ Session”.</p>";
  list.forEach((s) => {
    const c = document.createElement("div"); c.className = "card";
    c.innerHTML = `<div class="grow"><b>${s.name}</b><small>${s.agent} · ${s.role} · ${s.alive ? "running" : "stopped"}</small><small class="pill">${s.cwd}</small></div>`;
    const open = document.createElement("button"); open.textContent = "Open"; open.onclick = () => openSession(s);
    const del = document.createElement("button"); del.textContent = "✕"; del.onclick = async () => { await api("/sessions/" + s.id, { method: "DELETE" }); if (active === s.id) { active = null; } refresh(); };
    c.append(open, del); h.appendChild(c);
  });
}

// opencode sessions default to the chat GUI; everything else to the terminal
function openSession(s) {
  if (s.agent === "opencode") openChat(s); else openTerminal(s);
}

// ---- terminal session ----
function openTerminal(s) {
  active = s.id;
  activeSession = s;
  showView("vSession");
  if (!term) {
    term = new Terminal({ fontSize: 13, cursorBlink: true, theme: { background: "#0d1117" } });
    fit = new FitAddon.FitAddon(); term.loadAddon(fit);
    term.open(qs("#term"));
    term.onData((d) => ws && ws.readyState === 1 && ws.send(JSON.stringify({ t: "i", d })));
  }
  term.reset();
  if (ws) { ws.onclose = null; ws.close(); }
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}/ws?session=${s.id}&token=${encodeURIComponent(TOKEN)}`);
  ws.onmessage = (e) => { const m = JSON.parse(e.data); if (m.t === "o") term.write(m.d); else if (m.t === "exit") term.write("\r\n[process exited]\r\n"); };
  ws.onopen = () => doFit();
  buildOptbar(s);
  hideAC(); acCtxDir = null; allSkills = []; loadSkills().catch(() => {}); // autocomplete in the CLI composer too
  refresh();
  setTimeout(doFit, 50);
}
function doFit() {
  if (!fit) return; try { fit.fit(); } catch {}
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ t: "r", cols: term.cols, rows: term.rows }));
}
addEventListener("resize", doFit);

// ---- composer (Claude-mobile-style input bar -> writes to the pty) ----
const msgInput = qs("#msgInput");
function growInput() { msgInput.style.height = "auto"; msgInput.style.height = Math.min(msgInput.scrollHeight, window.innerHeight * 0.3) + "px"; }
function sendMsg() {
  const v = msgInput.value;
  if (!v.trim() || !ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ t: "i", d: v + "\r" }));
  msgInput.value = ""; growInput(); msgInput.focus();
}
msgInput.addEventListener("input", () => { growInput(); updateAC(); });
msgInput.addEventListener("keydown", (e) => { if (acKeydown(e)) return; if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); } });
qs("#send").onclick = sendMsg;

// voice dictation via the browser's native SpeechRecognition (no dependency)
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
  const rec = new SR(); rec.interimResults = false; rec.continuous = false;
  let recording = false;
  rec.onresult = (e) => { const t = e.results[0][0].transcript; msgInput.value += (msgInput.value && !msgInput.value.endsWith(" ") ? " " : "") + t; growInput(); };
  rec.onend = () => { recording = false; qs("#micBtn").classList.remove("rec"); };
  qs("#micBtn").onclick = () => { if (recording) { rec.stop(); return; } try { rec.start(); recording = true; qs("#micBtn").classList.add("rec"); } catch {} };
} else { qs("#micBtn").style.display = "none"; }

// ---- per-agent option buttons (Model / Mode / Effort) ----
function openMenu(title, items, onPick, opts = {}) {
  qs("#menuTitle").textContent = title;
  const search = qs("#menuSearch");
  const render = (q = "") => {
    const l = qs("#menuList"); l.innerHTML = "";
    const f = items.filter((it) => !q || it.label.toLowerCase().includes(q.toLowerCase()));
    if (!f.length) l.innerHTML = "<div class='pill'>None</div>";
    f.forEach((it) => { const d = document.createElement("div"); d.textContent = it.label; d.onclick = () => { onPick(it); qs("#dlgMenu").close(); }; l.appendChild(d); });
  };
  if (opts.search) { search.style.display = ""; search.value = ""; search.oninput = () => render(search.value); }
  else search.style.display = "none";
  render();
  qs("#dlgMenu").showModal();
  if (opts.search) setTimeout(() => search.focus(), 50);
}
qs("#menuClose").onclick = () => qs("#dlgMenu").close();

function buildOptbar(s) {
  const bar = qs("#optbar"); bar.innerHTML = "";
  const d = agents[s.agent] || {};
  if (s.agent === "opencode") {
    const cb = document.createElement("button"); cb.className = "optbtn"; cb.textContent = "💬 Chat";
    cb.onclick = () => openChat(s); bar.appendChild(cb);
  }
  const apply = (body) => api("/apply", { method: "POST", body: JSON.stringify({ session: s.id, ...body }) });
  const pick = (o) => { if (o.slash || o.text) apply({ send: o.slash || o.text }); else if (o.flag) apply({ respawnArgs: o.flag.split(" ").filter(Boolean) }); };
  const btn = (label, opts) => {
    if (!opts || !opts.length) return;
    const b = document.createElement("button"); b.className = "optbtn"; b.textContent = label + " ▾";
    b.onclick = () => openMenu(label, opts, pick); bar.appendChild(b);
  };
  btn("Model", d.models); btn("Mode", d.modes); btn("Effort", d.efforts);
}

// ---- opencode chat GUI ----
let ocSid = null;
let chatModel = localStorage.getItem("ocModel") || "";
let pendingAtts = []; // {filename, mime, dataUrl}

async function ensureOcSession(s) {
  // server keeps the opencode conversation id in session meta (shared across devices + the CLI tab)

  pendingAtts = []; renderAtts();
  try {

// live event stream → reload the conversation as opencode streams parts
let evtSrc = null, reloadPending = false;
function stopEvents() { if (evtSrc) { evtSrc.close(); evtSrc = null; } }
function startEvents() {
  stopEvents();
  evtSrc = new EventSource("/oc/events?sid=" + encodeURIComponent(ocSid) + "&token=" + encodeURIComponent(TOKEN));
  evtSrc.onmessage = (e) => {
    let ev; try { ev = JSON.parse(e.data); } catch { return; }
    const type = (ev.payload && ev.payload.type) || ev.type || "";
    if (/question\.(v2\.)?asked/.test(type) && ev.payload && ev.payload.properties) { openQuestions(ev.payload.properties); }
    if (/idle/.test(type)) setSending(false);
    if (!reloadPending) { reloadPending = true; setTimeout(() => { reloadPending = false; loadChat().catch(() => {}); }, 250); }
  };
}

// ---- AI questions (single/multiple choice + custom text), paged ----
let qReq = null, qIdx = 0, qAnswers = [], answeredMsgId = null;
async function checkPendingQuestions() {
  try { const list = await api("/oc/questions?sid=" + encodeURIComponent(ocSid)); if (list && list.length) openQuestions(list[0]); } catch {}
}
// Models that can't call the structured-question tool just TYPE the questions.
// Parse a "...?" line followed by "- option" bullets into a synthetic request
// (no requestID) so the same sheet appears; reply is sent as a normal message.
function parseTextQuestions(text) {
  const clean = (s) => s.replace(/\*\*/g, "").replace(/^[-*\d.\)\s]+/, "").trim();
  const questions = []; let cur = null;
  for (const raw of (text || "").split(/\r?\n/)) {
    const line = raw.trim();
    const b = /^[-*]\s+(.+)/.exec(line);
    if (b && cur) { cur.options.push({ label: clean(b[1]) }); continue; }
    const q = clean(line);
    if (q.endsWith("?")) { cur = { question: q, header: "Question", options: [], multiple: false, custom: true }; questions.push(cur); }
    else cur = null; // a non-bullet, non-question line breaks the current option list
  }
  const valid = questions.filter((q) => q.options.length >= 2);
  return valid.length ? { synthetic: true, questions: valid } : null;
}
// when the assistant's *last* message is a question, pop the sheet. Two cases:
//  - structured: a `question` tool part still running (data in state.input.questions)
//  - typed: a plain-text "...?" + bullets question (parseTextQuestions)
// Either way we reply as a normal chat message (the pending-question REST registry
// isn't recoverable after a reload), so both are flagged synthetic.
function maybeTextQuestion(list) {
  if (qReq || chatSending) return;
  const last = list[list.length - 1];
  if (!last || !(last.info && last.info.role === "assistant")) return;
  if (last.info.id === answeredMsgId) return;
  const qtool = (last.parts || []).find((p) => p.type === "tool" && p.tool === "question"
    && p.state && p.state.status === "running" && p.state.input && p.state.input.questions);
  let req = null;
  if (qtool) {
    req = { synthetic: true, questions: qtool.state.input.questions.map((q) => ({ ...q, multiple: !!q.multiple, custom: true })) };
  } else {
    const text = (last.parts || []).filter((p) => p.type === "text").map((p) => p.text).join("\n");
    req = parseTextQuestions(text);
  }
  if (req) { req.id = "q:" + last.info.id; req.msgId = last.info.id; openQuestions(req); }
}
function openQuestions(req) {
  if (!req || !req.questions || !req.questions.length) return;
  if (qReq && qReq.id === req.id) return; // already showing
  qReq = req; qIdx = 0; qAnswers = req.questions.map(() => []);
  renderQuestion(); qs("#qWrap").classList.add("show");
}
function renderQuestion() {
  const q = qReq.questions[qIdx], n = qReq.questions.length;
  qs("#qHeader").textContent = q.header || "Question";
  qs("#qPager").textContent = (qIdx + 1) + " / " + n;
  qs("#qPager").style.display = n > 1 ? "" : "none";
  qs("#qQuestion").textContent = q.question || "";
  const body = qs("#qBody"); body.innerHTML = "";
  (q.options || []).forEach((o) => {
    const lab = document.createElement("label"); lab.className = "qopt";
    const inp = document.createElement("input"); inp.type = q.multiple ? "checkbox" : "radio"; inp.name = "qopt"; inp.value = o.label;
    inp.onchange = () => [...body.querySelectorAll(".qopt")].forEach((el) => el.classList.toggle("sel", el.querySelector("input").checked));
    const tx = document.createElement("div"); tx.innerHTML = `<div class="qol">${o.label}</div>${o.description ? `<div class="qod">${o.description}</div>` : ""}`;
    lab.append(inp, tx); body.appendChild(lab);
  });
  if (q.custom) { const ci = document.createElement("input"); ci.className = "qcustom"; ci.placeholder = "Other… (type a different answer)"; body.appendChild(ci); }
  qs("#qNext").textContent = qIdx === n - 1 ? "Submit" : "Next";
}
function collectCurrent() {
  const body = qs("#qBody");
  const sel = [...body.querySelectorAll("input[type=radio]:checked, input[type=checkbox]:checked")].map((i) => i.value);
  const custom = body.querySelector(".qcustom"); const cv = custom ? custom.value.trim() : "";
  if (cv) sel.push(cv);
  return sel;
}
qs("#qNext").onclick = async () => {
  qAnswers[qIdx] = collectCurrent();
  if (qIdx < qReq.questions.length - 1) { qIdx++; renderQuestion(); return; }
  const req = qReq; qReq = null; qs("#qWrap").classList.remove("show");
  if (req.synthetic) { // typed question: reply as a normal chat message
    answeredMsgId = req.msgId;
    chatInput.value = req.questions.map((q, i) => "• " + q.question + " → " + (qAnswers[i] || []).join(", ")).join("\n");
    growChat(); sendChat();
    return;
  }
  try { await api("/oc/question/reply", { method: "POST", body: JSON.stringify({ requestID: req.id, answers: qAnswers }) }); } catch (e) { alert("reply failed: " + e.message); }
};
qs("#qCancel").onclick = async () => {
  const req = qReq; qReq = null; qs("#qWrap").classList.remove("show");
  if (!req) return;
  if (req.synthetic) { answeredMsgId = req.msgId; return; } // just dismiss; don't re-pop
  try { await api("/oc/question/reject", { method: "POST", body: JSON.stringify({ requestID: req.id }) }); } catch {}
};
function updateModelBtn() { qs("#chatModelBtn").textContent = (chatModel ? chatModel.split("/").pop() : "Model") + " ▾"; }
async function loadChat() {
  const list = await api("/oc/messages?sid=" + ocSid);
  renderMessages(list);
  maybeTextQuestion(list);
}
function renderMessages(list) {
  const c = qs("#chatMsgs"); c.innerHTML = "";
  list.forEach((m) => {
    const role = m.info && m.info.role === "user" ? "user" : "assistant";
    (m.parts || []).forEach((p) => {
      if (p.type === "text" && p.text && p.text.trim()) {
        const d = document.createElement("div"); d.className = "msg " + role; d.textContent = p.text; c.appendChild(d);
      } else if (p.type === "reasoning" && p.text && p.text.trim()) {
        const d = document.createElement("details"); d.className = "reason";
        const sm = document.createElement("summary"); sm.textContent = "💭 thinking";
        const tx = document.createElement("div"); tx.className = "reasontext"; tx.textContent = p.text.trim();
        d.append(sm, tx); c.appendChild(d);
      } else if (p.type === "tool") {
        const st = p.state || {}; const label = st.title || p.tool || "tool";
        const d = document.createElement("div"); d.className = "toolcard";
        d.textContent = (st.status === "error" ? "⚠️ " : "🔧 ") + label; c.appendChild(d);
      } else if (p.type === "file" && p.mime && p.mime.startsWith("image/") && p.url) {
        const img = document.createElement("img"); img.className = "att"; img.src = "/oc/file?url=" + encodeURIComponent(p.url) + "&token=" + encodeURIComponent(TOKEN); c.appendChild(img);
      }
    });
  });
  if (chatSending) { const d = document.createElement("div"); d.className = "thinking"; d.textContent = "opencode is working…"; c.appendChild(d); }
  c.scrollTop = c.scrollHeight;
}
function renderAtts() {
  const a = qs("#chatAtts"); a.innerHTML = "";
  pendingAtts.forEach((att, i) => {
    const w = document.createElement("div"); w.className = "attthumb";
    if (att.mime.startsWith("image/")) { const im = document.createElement("img"); im.src = att.dataUrl; w.appendChild(im); }
    else { const f = document.createElement("div"); f.className = "attfile"; f.textContent = "📄 " + att.filename; w.appendChild(f); }
    const x = document.createElement("button"); x.className = "attx"; x.textContent = "✕";
    x.onclick = () => { pendingAtts.splice(i, 1); renderAtts(); };
    w.appendChild(x); a.appendChild(w);
  });
}
const chatInput = qs("#chatInput");
function growChat() { chatInput.style.height = "auto"; chatInput.style.height = Math.min(chatInput.scrollHeight, window.innerHeight * 0.3) + "px"; }
chatInput.addEventListener("input", () => { growChat(); updateAC(); });
chatInput.addEventListener("keydown", (e) => {
  if (acKeydown(e)) return;
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (!chatSending) sendChat(); }
});
let chatSending = false, sendAbort = null;
function setSending(on) {
  chatSending = on;
  const b = qs("#chatSend");
  b.classList.toggle("stop", on);
  b.textContent = on ? "■" : "↑";
  b.title = on ? "Stop" : "Send";
}
function stopChat() {
  if (sendAbort) sendAbort.abort();
  if (ocSid) api("/oc/abort", { method: "POST", body: JSON.stringify({ sid: ocSid }) }).catch(() => {});
}
async function sendChat() {
  const t = chatInput.value.trim();
  if (!t && !pendingAtts.length) return;
  const parts = [];
  pendingAtts.forEach((a) => parts.push({ type: "file", mime: a.mime, filename: a.filename, url: a.dataUrl }));
  if (t) parts.push({ type: "text", text: t });
  // optimistic user bubble + thinking indicator
  const c = qs("#chatMsgs");
  pendingAtts.filter((a) => a.mime.startsWith("image/")).forEach((a) => { const im = document.createElement("img"); im.className = "att"; im.src = a.dataUrl; c.appendChild(im); });
  if (t) { const d = document.createElement("div"); d.className = "msg user"; d.textContent = t; c.appendChild(d); }
  const think = document.createElement("div"); think.className = "thinking"; think.textContent = "opencode is working…"; c.appendChild(think); c.scrollTop = c.scrollHeight;
  chatInput.value = ""; growChat(); pendingAtts = []; renderAtts();
  sendAbort = new AbortController(); setSending(true);
  try {
    await api("/oc/send", { method: "POST", signal: sendAbort.signal, body: JSON.stringify({ sid: ocSid, model: chatModel, parts, cwd: activeSession.cwd }) });
    await loadChat();
  } catch (e) {
    if (e.name === "AbortError") { think.textContent = "⏹ stopped"; await loadChat().catch(() => {}); }
    else think.textContent = "⚠️ " + e.message;
  }
  setSending(false); sendAbort = null;
}
qs("#chatSend").onclick = () => { if (chatSending) stopChat(); else sendChat(); };

// ---- inline autocomplete (/ skills, @ files) above the active composer (chat OR cli) ----
const qsa = (s) => [...document.querySelectorAll(s)];
let acItems = [], acSel = 0, acCtxDir = null, acCtxEntries = [];
function acCtx() {
  const onChat = qs("#vChat").classList.contains("show");
  return { input: onChat ? qs("#chatInput") : qs("#msgInput"), pop: onChat ? qs("#acPop") : qs("#acPopT") };
}
function hideAC() { qsa(".acpop").forEach((p) => { p.classList.remove("show"); p.innerHTML = ""; }); acItems = []; }
function getTrigger(input) {
  const v = input.value, pos = input.selectionStart, before = v.slice(0, pos);
  let m = before.match(/(^|\s)\/([^\s\/@]*)$/);          // /skill  (no slashes in the query)
  if (m) return { char: "/", query: m[2], start: pos - m[2].length - 1 };
  m = before.match(/(^|\s)@([^\s@]*)$/);                  // @path/to  (slashes allowed)
  if (m) return { char: "@", query: m[2], start: pos - m[2].length - 1 };
  return null;
}
function replaceToken(input, t, text) {
  const v = input.value, pos = input.selectionStart;
  input.value = v.slice(0, t.start) + text + v.slice(pos);
  const np = t.start + text.length; input.setSelectionRange(np, np);
  input.focus(); input.dispatchEvent(new Event("input")); // grows + re-evaluates (dir nav keeps it open)
}
function acMove(d) {
  const { pop } = acCtx();
  acSel = (acSel + d + acItems.length) % acItems.length;
  [...pop.querySelectorAll(".acitem")].forEach((el, i) => el.classList.toggle("sel", i === acSel));
  const sel = pop.querySelector(".acitem.sel"); if (sel) sel.scrollIntoView({ block: "nearest" });
}
function renderAC(pop, items) {
  if (!items.length) { pop.classList.remove("show"); pop.innerHTML = ""; acItems = []; return; } // no match → disappear
  acItems = items; acSel = 0; pop.innerHTML = "";
  let lastSec = null;
  items.forEach((it, i) => {
    if (it.section && it.section !== lastSec) { lastSec = it.section; const h = document.createElement("div"); h.className = "achdr"; h.textContent = it.section; pop.appendChild(h); }
    const d = document.createElement("div"); d.className = "acitem" + (i === acSel ? " sel" : ""); d.innerHTML = it.html;
    d.onmousedown = (e) => { e.preventDefault(); it.pick(); }; // mousedown keeps the textarea focused
    pop.appendChild(d);
  });
  pop.classList.add("show");
}
async function updateAC() {
  if (!activeSession) return hideAC();
  const { input, pop } = acCtx();
  qsa(".acpop").forEach((p) => { if (p !== pop) { p.classList.remove("show"); p.innerHTML = ""; } });
  const t = getTrigger(input);
  if (!t) { pop.classList.remove("show"); pop.innerHTML = ""; acItems = []; return; } // trigger deleted → disappear
  if (t.char === "/") {
    const q = t.query.toLowerCase();
    const items = allSkills.filter((s) => ["skill", "builtin"].includes(s.category || "skill") && s.name.toLowerCase().includes(q))
      .slice(0, 40).map((s) => ({
        section: s.category === "builtin" ? "Built-in" : "Skills",
        html: `<span>✦ ${s.name}</span>${s.description ? `<span class="acd">${s.description.slice(0, 38)}</span>` : ""}`,
        pick: () => replaceToken(input, t, (s.invoke || ("/" + s.name)) + " "),
      }));
    renderAC(pop, items);
  } else {
    const q = t.query, slash = q.lastIndexOf("/");
    const dirPart = slash >= 0 ? q.slice(0, slash) : "", base = (slash >= 0 ? q.slice(slash + 1) : q).toLowerCase();
    const dirAbs = activeSession.cwd + (dirPart ? "/" + dirPart : "");
    if (acCtxDir !== dirAbs) {
      try { acCtxEntries = (await api("/fs?mode=all&path=" + encodeURIComponent(dirAbs))).entries; acCtxDir = dirAbs; }
      catch { acCtxEntries = []; acCtxDir = dirAbs; }
    }
    const items = acCtxEntries.filter((e) => e.name.toLowerCase().includes(base)).slice(0, 50).map((e) => {
      const rel = (dirPart ? dirPart + "/" : "") + e.name;
      return { section: "Context", html: (e.dir ? "📁 " : "📄 ") + e.name, pick: () => replaceToken(input, t, e.dir ? "@" + rel + "/" : "@" + rel + " ") };
    });
    renderAC(pop, items);
  }
}
function acKeydown(e) {
  const { pop } = acCtx();
  if (!pop.classList.contains("show")) return false;
  if (e.key === "ArrowDown") { e.preventDefault(); acMove(1); return true; }
  if (e.key === "ArrowUp") { e.preventDefault(); acMove(-1); return true; }
  if (e.key === "Enter") { e.preventDefault(); if (acItems[acSel]) acItems[acSel].pick(); return true; }
  if (e.key === "Escape") { e.preventDefault(); hideAC(); return true; }
  return false;
}
// click outside → disappear (item taps use mousedown, so they don't trigger this)
document.addEventListener("click", (e) => {

const fileToAtt = (f) => new Promise((res) => { const r = new FileReader(); r.onload = () => res({ filename: f.name || "pasted", mime: f.type || "application/octet-stream", dataUrl: r.result }); r.readAsDataURL(f); });

(() => {

  if (!SR) { qs("#chatMic").style.display = "none"; return; }
  const rec = new SR(); rec.interimResults = false; rec.continuous = false; let on = false;

  rec.onend = () => { on = false; qs("#chatMic").classList.remove("rec"); };

    const div = document.createElement("div"); div.textContent = "📁 " + e.name;
    div.onclick = () => { nCwd = r.path + "/" + e.name; nfsLoad(); };
    l.appendChild(div);
  });
}
qs("#fsUp").onclick = () => { nCwd = nCwd.replace(/[\\/][^\\/]+[\\/]?$/, ""); nfsLoad(); };
qs("#fsMk").onclick = async () => { const name = qs("#fsNew").value.trim(); if (!name) return; const r = await api("/fs", { method: "POST", body: JSON.stringify({ path: nCwd, name }) }); nCwd = r.path; qs("#fsNew").value = ""; nfsLoad(); };
qs("#nCancel").onclick = () => qs("#dlgNew").close();
qs("#nCreate").onclick = async () => {
  const meta = await api("/sessions", { method: "POST", body: JSON.stringify({ name: qs("#nName").value.trim(), agent: qs("#nAgent").value, cwd: nCwd }) });
  qs("#dlgNew").close(); await refresh(); openSession({ ...meta, alive: true });
};

// ---- screen ----
let shotTimer;
function startScreen() { const img = qs("#shot"); const tick = () => img.src = "/screen.jpg?token=" + encodeURIComponent(TOKEN) + "&_=" + Date.now(); tick(); shotTimer = setInterval(tick, 1000); }
function stopScreen() { clearInterval(shotTimer); }

// ---- rustdesk ----
qs("#btnRust").onclick = async () => {
  const r = await api("/rustdesk");
  if (r.id) location.href = "rustdesk://" + r.id; else alert("Set rustdeskId in config.json (and install RustDesk).");
};

// ---- boot ----
(async () => {
  if (!TOKEN) { document.body.innerHTML = "<p style='padding:20px'>Missing ?token=… in the URL.</p>"; return; }
  agents = await api("/agents").catch(() => ({}));
  await refresh();
  setInterval(refresh, 5000); // pick up sessions spawned by the controller
  if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js").catch(() => {});
})();
</script>
</body>
</html>
