<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#0d1117" />
<link rel="manifest" href="/manifest.webmanifest" />
<title>PC AI Remote</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" />
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.4 system-ui, sans-serif; background: #0d1117; color: #c9d1d9; height: 100dvh; display: flex; flex-direction: column; }
  header { display: flex; gap: 6px; align-items: center; padding: 8px; background: #161b22; border-bottom: 1px solid #30363d; }
  header b { flex: 1; font-size: 13px; }
  button { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 6px 10px; font-size: 13px; }
  button.primary { background: #238636; border-color: #2ea043; }
  button.active { background: #1f6feb; border-color: #388bfd; }
  #tabs { display: flex; gap: 6px; overflow-x: auto; padding: 6px 8px; background: #0d1117; border-bottom: 1px solid #30363d; }
  #tabs button { white-space: nowrap; }
  #main { flex: 1; position: relative; overflow: hidden; }
  .view { position: absolute; inset: 0; display: none; flex-direction: column; }
  .view.show { display: flex; }
  #term { flex: 1; padding: 4px; }
  #optbar { display: flex; gap: 6px; padding: 6px 8px; background: #161b22; border-top: 1px solid #30363d; overflow-x: auto; }
  #optbar:empty { display: none; }
  .optbtn { background: #21262d; border: 1px solid #30363d; border-radius: 16px; padding: 6px 12px; font-size: 13px; color: #c9d1d9; white-space: nowrap; flex: none; }
  /* Claude-mobile-style composer */
  #inputbar { position: relative; display: flex; align-items: flex-end; gap: 8px; padding: 8px; background: #161b22; border-top: 1px solid #30363d; }
  #inputbar .box { flex: 1; display: flex; align-items: flex-end; gap: 4px; background: #0d1117; border: 1px solid #30363d; border-radius: 22px; padding: 2px 4px 2px 8px; }
  #msgInput { flex: 1; background: transparent; border: none; color: #c9d1d9; font: inherit; font-size: 15px; padding: 9px 4px; resize: none; max-height: 30vh; }
  #msgInput:focus { outline: none; }
  #inputbar .icon, #chatBar .icon { background: transparent; border: none; color: #8b949e; font-size: 17px; padding: 7px; border-radius: 50%; line-height: 1; }
  #inputbar .icon.rec, #chatBar .icon.rec { color: #fb6a3c; }
  #send, #chatSend { background: #fb6a3c; border: none; color: #fff; width: 42px; height: 42px; border-radius: 50%; font-size: 20px; font-weight: 600; flex: none; }
  #chatSend.stop { background: #e5534b; font-size: 16px; }
  #send:disabled, #chatSend:disabled { background: #30363d; color: #8b949e; }
  .grp { display: flex; align-items: center; gap: 4px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 2px 4px; }
  .grp label { color: #8b949e; font-size: 11px; }
  #screen img { width: 100%; height: 100%; object-fit: contain; }
  #home { padding: 12px; overflow: auto; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 10px; margin-bottom: 8px; display: flex; gap: 8px; align-items: center; }
  .card .grow { flex: 1; }
  .card small { color: #8b949e; display: block; }
  input, select { background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 6px; font-size: 13px; }
  dialog { background: #161b22; color: #c9d1d9; border: 1px solid #30363d; border-bottom: none;
    border-radius: 18px 18px 0 0; width: 100%; max-width: 560px; padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
    position: fixed; inset: auto 0 0 0; margin: 0 auto; top: auto; max-height: 88vh; overflow: auto; }
  dialog::backdrop { background: rgba(0,0,0,.55); }
  dialog[open] { animation: sheetUp .22s cubic-bezier(.22,.61,.36,1); }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  dialog h3 { margin: 0 0 8px; }
  .row { display: flex; gap: 6px; margin: 6px 0; align-items: center; }
  .row > * { min-width: 0; }
  #fsList { max-height: 40vh; overflow: auto; border: 1px solid #30363d; border-radius: 6px; }
  #fsList div { padding: 8px; border-bottom: 1px solid #21262d; }
  #fsList div:active { background: #21262d; }
  .pill { font-size: 11px; color: #8b949e; }
  /* skills + context bottom sheet */
  dialog.sheet { max-width: 560px; max-height: 86vh; }
  .tabs { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; }
  .tabs button.on { background: #1f6feb; border-color: #388bfd; }
  .search { width: 100%; margin-bottom: 6px; }
  .list { max-height: 58vh; overflow: auto; border: 1px solid #30363d; border-radius: 6px; }
  .list div { padding: 10px; border-bottom: 1px solid #21262d; display: flex; gap: 8px; align-items: center; }
  .list div:active { background: #21262d; }
  .src { margin-left: auto; font-size: 11px; color: #8b949e; }
  .list .seclabel { display: block; border: none; padding: 10px 6px 4px; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: #6e7681; }
  .crumbs { font-size: 12px; color: #8b949e; margin: 4px 0; word-break: break-all; }
  /* opencode chat view (Claude-mobile style) */
  #chatTop { display: flex; gap: 8px; align-items: center; padding: 8px; background: #161b22; border-bottom: 1px solid #30363d; }
  #chatTop button { background: #21262d; border: 1px solid #30363d; border-radius: 16px; padding: 6px 12px; font-size: 13px; color: #c9d1d9; white-space: nowrap; }
  #chatMsgs { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 85%; padding: 10px 13px; border-radius: 16px; white-space: pre-wrap; word-break: break-word; line-height: 1.45; }
  .msg.markdown { max-width: 100%; white-space: normal; } /* responses fill the column */
  .msg.user { align-self: flex-end; background: #1f6feb; color: #fff; border-bottom-right-radius: 5px; }
  /* markdown content (responses + plan preview) — fills width, only vertical scroll */
  .markdown, .planprev { overflow-wrap: anywhere; }
  .markdown > :first-child, .planprev > :first-child { margin-top: 0; }
  .markdown > :last-child, .planprev > :last-child { margin-bottom: 0; }
  .markdown h1, .planprev h1 { font-size: 19px; } .markdown h2, .planprev h2 { font-size: 17px; } .markdown h3, .planprev h3 { font-size: 15px; }
  .markdown h1, .markdown h2, .markdown h3, .markdown h4, .planprev h1, .planprev h2, .planprev h3, .planprev h4 { margin: 14px 0 6px; line-height: 1.3; }
  .markdown p, .planprev p { margin: 7px 0; }
  .markdown ul, .markdown ol, .planprev ul, .planprev ol { margin: 6px 0; padding-left: 22px; }
  .markdown li, .planprev li { margin: 3px 0; }
  .markdown a, .planprev a { color: #58a6ff; }
  .markdown code, .planprev code { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: .9em; background: #21262d; padding: 1px 5px; border-radius: 5px; }
  .markdown pre, .planprev pre { background: #0d1117; border: 1px solid #30363d; border-radius: 10px; padding: 10px 12px; overflow-x: auto; margin: 8px 0; }
  .markdown pre code, .planprev pre code { background: none; padding: 0; font-size: 12.5px; line-height: 1.45; }
  .markdown blockquote, .planprev blockquote { margin: 8px 0; padding: 2px 12px; border-left: 3px solid #30363d; color: #8b949e; }
  .markdown table, .planprev table { display: block; max-width: 100%; overflow-x: auto; border-collapse: collapse; margin: 8px 0; }
  .markdown th, .markdown td, .planprev th, .planprev td { border: 1px solid #30363d; padding: 5px 9px; }
  .markdown img, .planprev img { max-width: 100%; height: auto; border-radius: 8px; }
  .markdown hr, .planprev hr { border: none; border-top: 1px solid #30363d; margin: 12px 0; }
  .msg.assistant { align-self: flex-start; background: #161b22; border: 1px solid #30363d; border-bottom-left-radius: 5px; }
  .toolcard { align-self: flex-start; max-width: 88%; font-size: 12px; color: #adbac7; background: #0d1117; border: 1px solid #30363d; border-radius: 10px; padding: 7px 11px; }
  .reason { align-self: flex-start; max-width: 88%; font-size: 12px; color: #6e7681; }
  .reason summary { cursor: pointer; list-style: none; }
  .reason summary::-webkit-details-marker { display: none; }
  .reason summary { display: flex; align-items: center; gap: 6px; color: #8b949e; }
  .reason .reasontext { font-style: italic; white-space: pre-wrap; margin-top: 4px; }
  .ic { width: 15px; height: 15px; flex: none; vertical-align: -2px; }
  .toolcard { align-self: flex-start; max-width: 88%; }
  .toolcard summary { display: flex; align-items: center; gap: 7px; cursor: pointer; list-style: none; }
  .toolcard summary::-webkit-details-marker { display: none; }
  .toolcard .ic { color: #58a6ff; }
  .toolcard summary > span { word-break: break-all; }
  .toolbody { margin-top: 6px; }
  .toolbody pre { background: #010409; border: 1px solid #30363d; border-radius: 8px; padding: 8px 10px; margin: 4px 0 0; overflow-x: auto; font-size: 12px; line-height: 1.4; white-space: pre-wrap; word-break: break-word; }
  .toolbody pre.toolout { color: #8b949e; }
  .runspin { width: 11px; height: 11px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin .7s linear infinite; flex: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* subtle "syncing fresh state over the cache" chip in the chat top bar */
  #chatSync { display: none; align-items: center; gap: 6px; font-size: 12px; color: #8b949e; }
  #chatSync.show { display: inline-flex; }
  #chatSync::before { content: ""; width: 11px; height: 11px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin .7s linear infinite; }
  #chatSync::after { content: "Syncing…"; }
  /* client-side queued messages (sent while the agent is busy) */
  #chatQueue:empty { display: none; }
  #chatQueue { display: flex; flex-direction: column; gap: 6px; padding: 4px 4px 8px; }
  .qmsg { display: flex; align-items: center; gap: 8px; background: #161b22; border: 1px dashed #495057; border-radius: 12px; padding: 7px 10px; font-size: 13px; }
  .qmsg .qbadge { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: #d29922; border: 1px solid #d29922; border-radius: 6px; padding: 1px 6px; flex: none; }
  .qmsg .qtext { flex: 1; min-width: 0; color: #adbac7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .qmsg .qx { background: transparent; border: none; color: #8b949e; font-size: 15px; padding: 2px 4px; flex: none; }
  .thinking { align-self: flex-start; color: #8b949e; font-size: 13px; }
  .att { align-self: flex-end; max-width: 60%; border-radius: 12px; border: 1px solid #30363d; }
  #chatBar { position: relative; padding: 8px; background: #161b22; border-top: 1px solid #30363d; }
  .acpop { position: absolute; left: 8px; right: 8px; bottom: calc(100% - 1px); max-height: 44vh; overflow-y: auto; background: #161b22; border: 1px solid #30363d; border-radius: 14px 14px 0 0; box-shadow: 0 -8px 24px rgba(0,0,0,.45); display: none; z-index: 50; }
  .acpop.show { display: block; }
  .acpop .achdr { padding: 8px 12px 4px; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: #6e7681; position: sticky; top: 0; background: #161b22; }
  .acpop .acitem { padding: 10px 12px; border-top: 1px solid #21262d; font-size: 14px; display: flex; gap: 6px; align-items: center; }
  .acpop .acitem.sel, .acpop .acitem:active { background: #1f6feb22; }
  .acpop .acd { color: #6e7681; font-size: 12px; }
  /* AI question / plan bottom sheet */
  #qWrap, #planWrap { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none; z-index: 100; align-items: flex-end; }
  #qWrap.show, #planWrap.show { display: flex; }
  #qSheet, #planSheet { width: 100%; max-height: 82vh; overflow-y: auto; background: #161b22; border-top: 1px solid #30363d; border-radius: 20px 20px 0 0; padding: 16px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 -10px 30px rgba(0,0,0,.5); }
  .planprev { font-size: 14px; line-height: 1.5; max-height: 46vh; overflow-y: auto; overflow-x: hidden; color: #c9d1d9; background: #0d1117; border: 1px solid #30363d; border-radius: 12px; padding: 12px; }
  #planRevise { background: #0d1117; border: 1px solid #30363d; border-radius: 12px; color: #c9d1d9; font: inherit; padding: 10px; resize: vertical; min-height: 70px; }
  #planRevise2 { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 12px; padding: 11px 16px; font-size: 14px; }
  #planReject { background: #2d1518; color: #f85149; border: 1px solid #da3633; border-radius: 12px; padding: 11px 16px; font-size: 14px; }
  #planAccept { background: #238636; color: #fff; border: 1px solid #2ea043; border-radius: 12px; padding: 11px 18px; font-size: 14px; font-weight: 600; }
  /* "AI is working" animated indicator */
  .working { align-self: flex-start; display: flex; align-items: center; gap: 8px; color: #8b949e; font-size: 13px; }
  #chatWorking { display: none; padding: 2px 6px 8px; }
  #chatWorking.show { display: flex; }
  .working .dots { display: inline-flex; gap: 4px; }
  .working .dots i { width: 6px; height: 6px; border-radius: 50%; background: #58a6ff; animation: workdot 1s infinite ease-in-out; }
  .working .dots i:nth-child(2) { animation-delay: .15s; }
  .working .dots i:nth-child(3) { animation-delay: .3s; }
  @keyframes workdot { 0%, 80%, 100% { opacity: .25; transform: translateY(0); } 40% { opacity: 1; transform: translateY(-3px); } }
  .qhead { display: flex; align-items: center; gap: 8px; }
  .qhead .qh { font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: #8b949e; flex: 1; }
  .qpager { font-size: 12px; color: #8b949e; background: #21262d; border: 1px solid #30363d; border-radius: 10px; padding: 3px 9px; }
  .qq { font-size: 16px; line-height: 1.4; }
  #qBody { display: flex; flex-direction: column; gap: 8px; }
  .qopt { display: flex; gap: 10px; align-items: flex-start; padding: 11px 13px; border: 1px solid #30363d; border-radius: 12px; cursor: pointer; }
  .qopt.sel { border-color: #1f6feb; background: #1f6feb1f; }
  .qopt input { margin: 3px 0 0; flex: none; }
  .qopt .qol { font-size: 14px; }
  .qopt .qod { font-size: 12px; color: #8b949e; margin-top: 2px; }
  .qcustom { width: 100%; margin-top: 2px; }
  .qactions { display: flex; align-items: center; gap: 8px; padding-top: 4px; }
  #qNext { background: #fb6a3c; color: #fff; border: none; border-radius: 12px; padding: 11px 20px; font-size: 14px; font-weight: 600; }
  #qCancel { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 12px; padding: 11px 16px; font-size: 14px; }
  .composer { background: #0d1117; border: 1px solid #30363d; border-radius: 22px; padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }
  .metatrig { background: transparent; border: none; padding: 2px 0; color: #adbac7; font-size: 13px; display: inline-flex; align-items: center; gap: 4px; flex: none; }
  .metatrig:active { color: #fff; }
  .metatrig .cv { width: 11px; height: 11px; opacity: .7; }
  .composer-actions { display: flex; align-items: center; gap: 8px; overflow-x: auto; }
  #chatInput { width: 100%; background: transparent; border: none; color: #c9d1d9; font: inherit; font-size: 15px; padding: 4px 2px; resize: none; max-height: 30vh; }
  #chatInput:focus { outline: none; }
  .tool { display: inline-flex; align-items: center; gap: 7px; background: #21262d; border: 1px solid #30363d; border-radius: 8px; padding: 7px 12px; font-size: 13px; color: #c9d1d9; white-space: nowrap; flex: none; }
  .tool .ico { font-size: 15px; line-height: 1; opacity: .85; }
  #chatAtts { display: flex; gap: 10px; flex-wrap: wrap; padding: 2px 0; }
  #chatAtts:empty { display: none; }
  .attthumb { position: relative; width: 74px; height: 74px; border-radius: 14px; overflow: hidden; background: #21262d; border: 1px solid #30363d; flex: none; }
  .attthumb img { width: 100%; height: 100%; object-fit: cover; }
  .attthumb .attfile { display: flex; align-items: center; justify-content: center; height: 100%; padding: 6px; font-size: 11px; text-align: center; word-break: break-word; color: #adbac7; }
  .attthumb .attx { position: absolute; top: 3px; right: 3px; width: 22px; height: 22px; border-radius: 50%; border: none; background: rgba(0,0,0,.55); color: #fff; font-size: 12px; line-height: 1; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<header>
  <b>PC AI Remote</b>
  <button id="btnNew" class="primary">+ Session</button>
  <button data-view="screen">Screen</button>
  <button id="btnRust">RustDesk</button>
</header>
<div id="tabs"></div>
<div id="main">
  <div class="view show" id="home"></div>
  <div class="view" id="vSession">
    <div id="term"></div>
    <div id="optbar"></div>
    <div id="inputbar">
      <div id="acPopT" class="acpop"></div>
      <div class="box">
        <button class="icon" id="addBtn" title="Skills &amp; context">＋</button>
        <textarea id="msgInput" rows="1" placeholder="Message…"></textarea>
        <button class="icon" id="micBtn" title="Dictate">🎤</button>
      </div>
      <button id="send" title="Send">➤</button>
    </div>
  </div>
  <div class="view" id="screen"><img id="shot" alt="screen" /></div>
  <div class="view" id="vChat">
    <div id="chatTop">
      <span id="chatSync" title="Syncing…"></span>
      <span style="flex:1"></span>
      <button id="chatSessions" title="Switch session">☰</button>
      <button id="chatNewSame" title="New session, same workspace">⧉</button>
      <button id="chatRefresh" title="Refresh / new terminal">⟳</button>
      <button id="chatCli" title="Switch to terminal">⌨ CLI</button>
    </div>
    <div id="chatMsgs"></div>
    <div id="chatBar">
      <div id="acPop" class="acpop"></div>
      <div id="chatQueue"></div>
      <div id="chatWorking" class="working"></div>
      <div class="composer">
        <div id="chatAtts"></div>
        <textarea id="chatInput" rows="1" placeholder="Message opencode…"></textarea>
        <div class="composer-actions">
          <button class="metatrig" id="chatModeBtn" title="Mode"><span class="lbl">Build</span><svg class="cv" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>
          <button class="metatrig" id="chatModelBtn" title="Model"><span class="lbl">Model</span><svg class="cv" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>
          <button class="metatrig" id="chatEffortBtn" title="Reasoning effort" style="display:none"><span class="lbl">Effort</span><svg class="cv" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>
          <button class="tool" id="toolLibrary" style="display:none"><span class="ico">☰</span> Library</button>
          <button class="tool" id="toolContext" style="display:none"><span class="ico">☰</span> Context</button>
          <span style="flex:1"></span>
          <button class="icon" id="chatAddBtn" title="Attach">📎</button>
          <button class="icon" id="chatMic" title="Dictate">🎤</button>
          <button id="chatSend" title="Send">↑</button>
        </div>
      </div>
    </div>
  </div>
</div>
<input type="file" id="chatFile" accept="*/*" style="display:none" multiple />

<div id="qWrap">
  <div id="qSheet">
    <div class="qhead"><span id="qHeader" class="qh"></span><span id="qPager" class="qpager"></span></div>
    <div id="qQuestion" class="qq"></div>
    <div id="qBody"></div>
    <div class="qactions">
      <button id="qCancel">Cancel</button>
      <span style="flex:1"></span>
      <button id="qNext" class="primary">Next</button>
    </div>
  </div>
</div>

<div id="planWrap">
  <div id="planSheet">
    <div class="qhead"><span class="qh">Plan</span></div>
    <div id="planPreview" class="planprev"></div>
    <textarea id="planRevise" placeholder="Add a requirement or change…" style="display:none"></textarea>
    <div class="qactions">
      <button id="planReject">Reject</button>
      <button id="planRevise2">Revise</button>
      <span style="flex:1"></span>
      <button id="planAccept" class="primary">Accept &amp; build</button>
    </div>
  </div>
</div>

<dialog id="dlgNew">
  <h3>New session</h3>
  <div class="row"><input id="nName" placeholder="name (optional)" class="grow" /></div>
  <div class="row"><label>agent</label><select id="nAgent" class="grow"></select></div>
  <div class="row"><label>folder</label><span id="nPath" class="grow pill"></span></div>
  <div class="row"><button id="fsUp">⬆ up</button><input id="fsNew" placeholder="new folder name" class="grow" /><button id="fsMk">mkdir</button></div>
  <div id="fsList"></div>
  <div class="row" style="justify-content:flex-end"><button id="nCancel">Cancel</button><button id="nCreate" class="primary">Create</button></div>
</dialog>

<dialog id="dlgMenu" class="sheet">
  <div class="tabs"><b id="menuTitle"></b><span style="flex:1"></span><button id="menuClose">Close</button></div>
  <input id="menuSearch" class="search" placeholder="Search…" style="display:none" />
  <div id="menuList" class="list"></div>
</dialog>

<dialog id="dlgAdd" class="sheet">
  <div class="tabs">
    <button id="tabSkills" class="on">✦ Library</button>
    <button id="tabCtx">＠ Context</button>
    <span style="flex:1"></span>
    <button id="addClose">Done</button>
  </div>
  <div id="paneSkills">
    <input id="skSearch" class="search" placeholder="Search skills…" />
    <div id="skList" class="list"></div>
  </div>
  <div id="paneCtx" style="display:none">
    <div class="row"><button id="ctxUp">⬆ up</button><button id="ctxAddDir">＋ this folder</button></div>
    <div id="ctxCrumb" class="crumbs"></div>
    <div id="ctxList" class="list"></div>
  </div>
</dialog>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script>
const TOKEN = new URLSearchParams(location.search).get("token") || localStorage.getItem("token") || "";
if (TOKEN) localStorage.setItem("token", TOKEN);
const qs = (s) => document.querySelector(s);
const api = async (p, opt = {}) => {
  const sep = p.includes("?") ? "&" : "?";
  const r = await fetch(p + sep + "token=" + encodeURIComponent(TOKEN), {
    ...opt, headers: { "Content-Type": "application/json", ...(opt.headers || {}) },
  });
  if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || r.status);
  return r.ctHeaderJson === false ? r : r.json();
};

// markdown -> sanitized HTML (model/user output is untrusted; never raw innerHTML)
if (window.DOMPurify) DOMPurify.addHook("afterSanitizeAttributes", (n) => {
  if (n.tagName === "A") { n.setAttribute("target", "_blank"); n.setAttribute("rel", "noopener noreferrer"); }
});
function md(text) {
  text = text || "";
  if (window.marked && window.DOMPurify) { try { return DOMPurify.sanitize(marked.parse(text, { breaks: true })); } catch {} }
  return esc(text); // fallback: escaped plain text
}
function esc(s) { const d = document.createElement("div"); d.textContent = s == null ? "" : String(s); return d.innerHTML; }

// dismiss any dialog (bottom sheet) when pressing outside its box
document.querySelectorAll("dialog").forEach((d) => {
  d.addEventListener("click", (e) => {
    if (e.target !== d) return; // clicks on content bubble up with target = child
    const r = d.getBoundingClientRect();
    if (e.clientY < r.top || e.clientY > r.bottom || e.clientX < r.left || e.clientX > r.right) d.close();
  });
});

let agents = {};        // descriptors
let active = null;      // active session id
let activeSession = null; // active session meta object
let term, fit, ws;      // xterm + websocket for active session

// ---- views ----
function showView(id) {
  document.querySelectorAll(".view").forEach((v) => v.classList.toggle("show", v.id === id));
  if (id === "screen") startScreen(); else stopScreen();
  if (id !== "vChat") { chatGen++; hideAC(); stopEvents(); stopStatusPoll(); qs("#qWrap").classList.remove("show"); qReq = null; }
}
document.querySelectorAll("[data-view]").forEach((b) => b.onclick = () => showView(b.dataset.view));

// ---- home / session list ----
async function refresh() {
  const list = await api("/sessions");
  // tabs
  const tabs = qs("#tabs"); tabs.innerHTML = "";
  const home = document.createElement("button"); home.textContent = "≡ Sessions";
  home.onclick = () => showView("home"); tabs.appendChild(home);
  list.forEach((s) => {
    const b = document.createElement("button");
    b.textContent = (s.alive ? "● " : "○ ") + s.name;
    b.className = s.id === active ? "active" : "";
    b.onclick = () => { // highlight immediately on click, before the async open
      active = s.id; [...tabs.children].forEach((el) => el.classList.remove("active")); b.classList.add("active");
      openSession(s);
    };
    tabs.appendChild(b);
  });
  // home cards
  const h = qs("#home"); h.innerHTML = "";
  if (!list.length) h.innerHTML = "<p class='pill'>No sessions. Tap “+ Session”.</p>";
  list.forEach((s) => {
    const c = document.createElement("div"); c.className = "card";
    c.innerHTML = `<div class="grow"><b>${s.name}</b><small>${s.agent} · ${s.role} · ${s.alive ? "running" : "stopped"}</small><small class="pill">${s.cwd}</small></div>`;
    const open = document.createElement("button"); open.textContent = "Open"; open.onclick = () => openSession(s);
    const del = document.createElement("button"); del.textContent = "✕"; del.onclick = async () => { await api("/sessions/" + s.id, { method: "DELETE" }); try { localStorage.removeItem(cacheKey(s.id)); } catch {} if (active === s.id) { active = null; } refresh(); };
    c.append(open, del); h.appendChild(c);
  });
}

// opencode sessions default to the chat GUI; everything else to the terminal
function openSession(s) {
  if (s.agent === "opencode") openChat(s); else openTerminal(s);
}

// ---- terminal session ----
function openTerminal(s) {
  active = s.id;
  activeSession = s;
  showView("vSession");
  if (!term) {
    term = new Terminal({ fontSize: 13, cursorBlink: true, theme: { background: "#0d1117" } });
    fit = new FitAddon.FitAddon(); term.loadAddon(fit);
    term.open(qs("#term"));
    term.onData((d) => ws && ws.readyState === 1 && ws.send(JSON.stringify({ t: "i", d })));
  }
  term.reset();
  if (ws) { ws.onclose = null; ws.close(); }
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}/ws?session=${s.id}&token=${encodeURIComponent(TOKEN)}`);
  ws.onmessage = (e) => { const m = JSON.parse(e.data); if (m.t === "o") term.write(m.d); else if (m.t === "exit") term.write("\r\n[process exited]\r\n"); };
  ws.onopen = () => doFit();
  buildOptbar(s);
  hideAC(); acCtxDir = null; allSkills = []; loadSkills().catch(() => {}); // autocomplete in the CLI composer too
  refresh();
  setTimeout(doFit, 50);
}
function doFit() {
  if (!fit) return; try { fit.fit(); } catch {}
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ t: "r", cols: term.cols, rows: term.rows }));
}
addEventListener("resize", doFit);

// ---- composer (Claude-mobile-style input bar -> writes to the pty) ----
const msgInput = qs("#msgInput");
function growInput() { msgInput.style.height = "auto"; msgInput.style.height = Math.min(msgInput.scrollHeight, window.innerHeight * 0.3) + "px"; }
function sendMsg() {
  const v = msgInput.value;
  if (!v.trim() || !ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ t: "i", d: v + "\r" }));
  msgInput.value = ""; growInput(); msgInput.focus();
}
msgInput.addEventListener("input", () => { growInput(); updateAC(); });
msgInput.addEventListener("keydown", (e) => { if (acKeydown(e)) return; if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); } });
qs("#send").onclick = sendMsg;

// voice dictation via the browser's native SpeechRecognition (no dependency)
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
  const rec = new SR(); rec.interimResults = false; rec.continuous = false;
  let recording = false;
  rec.onresult = (e) => { const t = e.results[0][0].transcript; msgInput.value += (msgInput.value && !msgInput.value.endsWith(" ") ? " " : "") + t; growInput(); };
  rec.onend = () => { recording = false; qs("#micBtn").classList.remove("rec"); };
  qs("#micBtn").onclick = () => { if (recording) { rec.stop(); return; } try { rec.start(); recording = true; qs("#micBtn").classList.add("rec"); } catch {} };
} else { qs("#micBtn").style.display = "none"; }

// ---- per-agent option buttons (Model / Mode / Effort) ----
function openMenu(title, items, onPick, opts = {}) {
  qs("#menuTitle").textContent = title;
  const search = qs("#menuSearch");
  const render = (q = "") => {
    const l = qs("#menuList"); l.innerHTML = "";
    const f = items.filter((it) => !q || it.label.toLowerCase().includes(q.toLowerCase()));
    if (!f.length) l.innerHTML = "<div class='pill'>None</div>";
    f.forEach((it) => { const d = document.createElement("div"); d.textContent = it.label; d.onclick = () => { onPick(it); qs("#dlgMenu").close(); }; l.appendChild(d); });
  };
  if (opts.search) { search.style.display = ""; search.value = ""; search.oninput = () => render(search.value); }
  else search.style.display = "none";
  render();
  qs("#dlgMenu").showModal();
  if (opts.search) setTimeout(() => search.focus(), 50);
}
qs("#menuClose").onclick = () => qs("#dlgMenu").close();

function buildOptbar(s) {
  const bar = qs("#optbar"); bar.innerHTML = "";
  const d = agents[s.agent] || {};
  const quick = (label, title, fn) => { const b = document.createElement("button"); b.className = "optbtn"; b.textContent = label; b.title = title; b.onclick = fn; bar.appendChild(b); };
  quick("☰", "Switch session", () => openSessionsMenu(s));
  quick("⧉", "New session, same workspace", () => newSameWorkspace(s));
  quick("⟳", "Refresh terminal", () => refreshSession(s));
  if (s.agent === "opencode") {
    const cb = document.createElement("button"); cb.className = "optbtn"; cb.textContent = "💬 Chat";
    cb.onclick = () => openChat(s); bar.appendChild(cb);
  }
  const apply = (body) => api("/apply", { method: "POST", body: JSON.stringify({ session: s.id, ...body }) });
  const pick = (o) => { if (o.slash || o.text) apply({ send: o.slash || o.text }); else if (o.flag) apply({ respawnArgs: o.flag.split(" ").filter(Boolean) }); };
  const btn = (label, opts) => {
    if (!opts || !opts.length) return;
    const b = document.createElement("button"); b.className = "optbtn"; b.textContent = label + " ▾";
    b.onclick = () => openMenu(label, opts, pick); bar.appendChild(b);
  };
  btn("Model", d.models); btn("Mode", d.modes); btn("Effort", d.efforts);
}

// ---- opencode chat GUI ----
let ocSid = null;
// per-session message cache (keyed by app session id, known before the network round-trip)
// so reopening a session shows its last state instantly while fresh data loads.
const cacheKey = (id) => "chat:" + id;
function loadCache(id) { try { const v = localStorage.getItem(cacheKey(id)); return v ? JSON.parse(v) : null; } catch { return null; } }
function saveCache(id, list) {
  if (!id || !list) return;
  const trim = (n) => JSON.stringify(list.slice(-n));
  try { localStorage.setItem(cacheKey(id), trim(80)); }
  catch { // quota: drop other sessions' caches, then store a smaller slice
    try { Object.keys(localStorage).forEach((k) => { if (k.startsWith("chat:") && k !== cacheKey(id)) localStorage.removeItem(k); }); localStorage.setItem(cacheKey(id), trim(40)); } catch {}
  }
}
function showSync(on) { qs("#chatSync").classList.toggle("show", on); }
let chatModel = localStorage.getItem("ocModel") || "";
let chatAgent = localStorage.getItem("ocAgent") || "build"; // mode: build / plan
let chatEffort = JSON.parse(localStorage.getItem("ocEffort") || "{}"); // model -> variant
let providers = {}; // "provider/model" -> { variants:[], reasoning }
let agentList = ["build", "plan"];
let pendingAtts = []; // {filename, mime, dataUrl}
let chatGen = 0; // bumped on every openChat; stale async results from a prior session bail out

async function ensureOcSession(s) {
  // server keeps the opencode conversation id in session meta (shared across devices + the CLI tab)
  const r = await api("/oc/session", { method: "POST", body: JSON.stringify({ session: s.id, cwd: s.cwd, title: s.name }) });
  return r.id;
}
async function openChat(s) {
  const myGen = ++chatGen;
  stopEvents(); stopStatusPoll(); // stop the previous session's sync immediately
  active = s.id; activeSession = s;
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  showView("vChat");
  hideAC(); acCtxDir = null;
  qReq = null; answeredMsgId = null; qs("#qWrap").classList.remove("show"); // re-evaluate questions for this session
  planReq = null; resolvedPlanId = null; qs("#planWrap").classList.remove("show"); // re-evaluate plans for this session
  msgQueue = []; renderQueue(); // queued sends are per-session
  serverBusy = false; lastMsgList = []; inFlight = false; suppressId = null; lastSig = ""; lastActivityAt = 0; // reset busy state for the new session
  pendingAtts = []; renderAtts();
  // show the cached state instantly (if any), then refresh in the background
  const cached = loadCache(s.id);
  if (cached && cached.length) { lastMsgList = cached; renderMessages(cached); showSync(true); }
  else qs("#chatMsgs").innerHTML = "<div class='thinking'>Loading…</div>";
  recomputeBusy(); // reflect cached state's busy (or clear a previous session's)
  try {
    ocSid = await ensureOcSession(s);
    if (myGen !== chatGen) return; // navigated to another session while resolving
    if (!chatModel) { const ms = await api("/oc/models").catch(() => []); chatModel = ms.find((m) => /free/i.test(m)) || ms[0] || ""; localStorage.setItem("ocModel", chatModel); }
    updateModelBtn();
    loadModeEffort(); // mode (build/plan) + per-model effort menus
    allSkills = []; loadSkills().catch(() => {}); // preload for the quick-menus + / @ triggers
    await loadChat(); // fetches fresh state, re-renders, and updates the cache
    if (myGen !== chatGen) return; // navigated away; don't start this session's sync
    syncBusy(); // reflect a turn that may already be running (e.g. started from the CLI)
    startEvents(); // live updates (thinking/tool/text stream in)
    startStatusPoll(); // keep tracking busy/model-wait even when SSE is quiet
    checkPendingQuestions(); // re-open a question asked before we connected
    flushQueue(); // send anything typed before ocSid was ready (never dropped)
  } catch (e) { if (myGen === chatGen && !(cached && cached.length)) qs("#chatMsgs").innerHTML = "<div class='thinking'>⚠️ " + e.message + "</div>"; }
  finally { if (myGen === chatGen) showSync(false); }
  refresh();
}
// live event stream → reload the conversation as opencode streams parts
let evtSrc = null, reloadPending = false;
function stopEvents() { if (evtSrc) { evtSrc.close(); evtSrc = null; } }
function startEvents() {
  stopEvents();
  evtSrc = new EventSource("/oc/events?sid=" + encodeURIComponent(ocSid) + "&token=" + encodeURIComponent(TOKEN));
  evtSrc.onmessage = (e) => {
    let ev; try { ev = JSON.parse(e.data); } catch { return; }
    const type = (ev.payload && ev.payload.type) || ev.type || "";
    if (/question\.(v2\.)?asked/.test(type) && ev.payload && ev.payload.properties) { openQuestions(ev.payload.properties); }
    syncBusy(); // re-check the real /session/status on any event (incl. idle) — never blind-clear
    scheduleReload();
  };
}
function scheduleReload() {
  if (reloadPending) return;
  reloadPending = true; setTimeout(() => { reloadPending = false; loadChat().catch(() => {}); }, 250);
}
// mobile suspends the page (and kills the SSE) when backgrounded; on return,
// reconnect the stream and reload so a turn that finished meanwhile shows up.
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "hidden") { if (active) saveCache(active, lastMsgList); return; } // cache before we may be suspended
  if (document.visibilityState === "visible" && ocSid && qs("#vChat").classList.contains("show")) {
    startEvents(); loadChat().catch(() => {}); syncBusy();
  }
});

// ---- AI plan approval (accept / revise / reject), persists across reloads ----
let planReq = null, resolvedPlanId = null;
// a message is a plan if produced in Plan mode, or its text reads like a plan proposal
function isPlan(text) {
  text = text || "";
  const heading = /(^|\n)#{1,4}[^\n]*\bplan\b/i.test(text); // "## Plan:" or "## Updated Plan: …"
  const proceed = /\b(ready to (proceed|implement|build|start|go)|proceed with (the )?(implementation|build|building|plan|this)|shall i proceed|do you want (me to proceed|any changes)|approve (the )?plan|implement when you('?re| are) ready)\b\??/i.test(text)
               || /(proceed|continue)\s+with\s+implementation\??/i.test(text);
  return heading || proceed;
}
function maybePlan(list) {
  if (qReq || planReq) return; // one sheet at a time; question takes precedence
  const last = list[list.length - 1];
  if (!last || !(last.info && last.info.role === "assistant")) return;
  if (!(last.info.time && last.info.time.completed)) return; // wait until the turn is done
  if (last.info.id === resolvedPlanId) return;
  const text = (last.parts || []).filter((p) => p.type === "text").map((p) => p.text).join("\n").trim();
  const planMode = last.info.agent === "plan" || last.info.mode === "plan";
  if (!text || !(planMode || isPlan(text))) return;
  openPlan({ id: last.info.id, text });
}
let planRevising = false;
function setReviseMode(on) {
  planRevising = on;
  qs("#planRevise").style.display = on ? "" : "none";
  qs("#planRevise2").textContent = on ? "Back" : "Revise";       // Revise ⇄ Back
  qs("#planAccept").textContent = on ? "Do revise" : "Accept & build"; // Accept ⇄ Do revise
  if (on) qs("#planRevise").focus();
}
function openPlan(req) {
  planReq = req;
  qs("#planPreview").innerHTML = md(req.text); // full plan as markdown; the box scrolls
  qs("#planRevise").value = ""; setReviseMode(false);
  qs("#planWrap").classList.add("show");
}
function closePlan() { planReq = null; setReviseMode(false); qs("#planWrap").classList.remove("show"); }
qs("#planAccept").onclick = () => {
  if (!planReq) return;
  if (planRevising) { // "Do revise": send the requirement + an inform prompt appended after it
    const txt = qs("#planRevise").value.trim(); if (!txt) { qs("#planRevise").focus(); return; }
    resolvedPlanId = planReq.id; closePlan();
    chatInput.value = txt + "\n\nKeep thinking about the plan with this additional information before implementing.";
    growChat(); sendChat();
    return;
  }
  resolvedPlanId = planReq.id; closePlan(); // "Accept & build"
  if (chatAgent !== "build") { chatAgent = "build"; localStorage.setItem("ocAgent", chatAgent); updateModeBtn(); } // plan can't edit
  chatInput.value = "Proceed with the plan and implement it."; growChat(); sendChat();
};
qs("#planRevise2").onclick = () => { if (planReq) setReviseMode(!planRevising); }; // Revise ⇄ Back toggle
qs("#planReject").onclick = () => { if (planReq) resolvedPlanId = planReq.id; closePlan(); }; // explicit reject, don't re-pop

// ---- AI questions (single/multiple choice + custom text), paged ----
let qReq = null, qIdx = 0, qAnswers = [], answeredMsgId = null;
async function checkPendingQuestions() {
  try { const list = await api("/oc/questions?sid=" + encodeURIComponent(ocSid)); if (list && list.length) openQuestions(list[0]); } catch {}
}
// Models that can't call the structured-question tool just TYPE the questions.
// Parse a "...?" line followed by "- option" bullets into a synthetic request
// (no requestID) so the same sheet appears; reply is sent as a normal message.
function parseTextQuestions(text) {
  const clean = (s) => s.replace(/\*\*/g, "").replace(/^[-*\d.\)\s]+/, "").trim();
  const questions = []; let cur = null;
  for (const raw of (text || "").split(/\r?\n/)) {
    const line = raw.trim();
    const b = /^[-*]\s+(.+)/.exec(line);
    if (b && cur) { cur.options.push({ label: clean(b[1]) }); continue; }
    const q = clean(line);
    if (q.endsWith("?")) { cur = { question: q, header: "Question", options: [], multiple: false, custom: true }; questions.push(cur); }
    else cur = null; // a non-bullet, non-question line breaks the current option list
  }
  const valid = questions.filter((q) => q.options.length >= 2);
  return valid.length ? { synthetic: true, questions: valid } : null;
}
// when the assistant's *last* message is a question, pop the sheet. Two cases:
//  - structured: a `question` tool part still running (data in state.input.questions)
//  - typed: a plain-text "...?" + bullets question (parseTextQuestions)
// Either way we reply as a normal chat message (the pending-question REST registry
// isn't recoverable after a reload), so both are flagged synthetic.
function maybeTextQuestion(list) {
  if (qReq || chatSending) return;
  const last = list[list.length - 1];
  if (!last || !(last.info && last.info.role === "assistant")) return;
  if (last.info.id === answeredMsgId) return;
  const qtool = (last.parts || []).find((p) => p.type === "tool" && p.tool === "question"
    && p.state && p.state.status === "running" && p.state.input && p.state.input.questions);
  let req = null;
  if (qtool) {
    req = { synthetic: true, fromTool: true, questions: qtool.state.input.questions.map((q) => ({ ...q, multiple: !!q.multiple, custom: true })) };
  } else {
    const text = (last.parts || []).filter((p) => p.type === "text").map((p) => p.text).join("\n");
    req = parseTextQuestions(text);
  }
  if (req) { req.id = "q:" + last.info.id; req.msgId = last.info.id; openQuestions(req); }
}
function openQuestions(req) {
  if (!req || !req.questions || !req.questions.length) return;
  if (qReq && qReq.id === req.id) return; // already showing
  qReq = req; qIdx = 0; qAnswers = req.questions.map(() => []);
  renderQuestion(); qs("#qWrap").classList.add("show");
}
function renderQuestion() {
  const q = qReq.questions[qIdx], n = qReq.questions.length;
  qs("#qHeader").textContent = q.header || "Question";
  qs("#qPager").textContent = (qIdx + 1) + " / " + n;
  qs("#qPager").style.display = n > 1 ? "" : "none";
  qs("#qQuestion").textContent = q.question || "";
  const body = qs("#qBody"); body.innerHTML = "";
  (q.options || []).forEach((o) => {
    const lab = document.createElement("label"); lab.className = "qopt";
    const inp = document.createElement("input"); inp.type = q.multiple ? "checkbox" : "radio"; inp.name = "qopt"; inp.value = o.label;
    inp.onchange = () => [...body.querySelectorAll(".qopt")].forEach((el) => el.classList.toggle("sel", el.querySelector("input").checked));
    const tx = document.createElement("div"); tx.innerHTML = `<div class="qol">${o.label}</div>${o.description ? `<div class="qod">${o.description}</div>` : ""}`;
    lab.append(inp, tx); body.appendChild(lab);
  });
  if (q.custom) { const ci = document.createElement("input"); ci.className = "qcustom"; ci.placeholder = "Other… (type a different answer)"; body.appendChild(ci); }
  qs("#qNext").textContent = qIdx === n - 1 ? "Submit" : "Next";
}
function collectCurrent() {
  const body = qs("#qBody");
  const sel = [...body.querySelectorAll("input[type=radio]:checked, input[type=checkbox]:checked")].map((i) => i.value);
  const custom = body.querySelector(".qcustom"); const cv = custom ? custom.value.trim() : "";
  if (cv) sel.push(cv);
  return sel;
}
// reply by aborting the (possibly blocked) turn and sending answers as a message.
// This is the reliable path: opencode's requestID often goes stale (QuestionNotFound),
// and a question tool blocks the turn so a plain message would queue without the abort.
async function replyAsMessage(req, answers) {
  if (req.msgId) answeredMsgId = req.msgId;
  try { await api("/oc/abort", { method: "POST", body: JSON.stringify({ sid: ocSid }) }); } catch {}
  chatInput.value = req.questions.map((q, i) => "• " + (q.question || "") + " → " + (answers[i] || []).join(", ")).join("\n");
  growChat(); sendChat();
}
qs("#qNext").onclick = async () => {
  qAnswers[qIdx] = collectCurrent();
  if (qIdx < qReq.questions.length - 1) { qIdx++; renderQuestion(); return; }
  const req = qReq; qReq = null; qs("#qWrap").classList.remove("show");
  if (req.synthetic) return replyAsMessage(req, qAnswers); // no requestID at all
  // live structured question: try the proper reply, fall back to a message if it's stale
  try { await api("/oc/question/reply", { method: "POST", body: JSON.stringify({ requestID: req.id, answers: qAnswers }) }); }
  catch { await replyAsMessage(req, qAnswers); }
};
qs("#qCancel").onclick = async () => {
  const req = qReq; qReq = null; qs("#qWrap").classList.remove("show");
  if (!req) return;
  if (req.synthetic) { answeredMsgId = req.msgId; return; } // just dismiss; don't re-pop
  try { await api("/oc/question/reject", { method: "POST", body: JSON.stringify({ requestID: req.id }) }); } catch {}
};
function updateModelBtn() { qs("#chatModelBtn").querySelector(".lbl").textContent = chatModel ? chatModel.split("/").pop() : "Model"; updateEffortBtn(); }

qs("#chatSessions").onclick = () => openSessionsMenu(activeSession);
qs("#chatNewSame").onclick = () => newSameWorkspace(activeSession);
qs("#chatRefresh").onclick = () => refreshSession(activeSession);
qs("#chatModelBtn").onclick = async () => {
  const ms = await api("/oc/models").catch(() => []);
  openMenu("Model", ms.map((m) => ({ label: m })), (it) => { chatModel = it.label; localStorage.setItem("ocModel", chatModel); updateModelBtn(); }, { search: true });
};
// attachments: file picker + paste image
const fileToAtt = (f) => new Promise((res) => { const r = new FileReader(); r.onload = () => res({ filename: f.name || "pasted", mime: f.type || "application/octet-stream", dataUrl: r.result }); r.readAsDataURL(f); });
qs("#chatAddBtn").onclick = () => qs("#chatFile").click();
qs("#chatFile").onchange = async (e) => { for (const f of e.target.files) pendingAtts.push(await fileToAtt(f)); renderAtts(); e.target.value = ""; };
chatInput.addEventListener("paste", async (e) => {
  const items = [...(e.clipboardData?.items || [])].filter((it) => it.kind === "file");
  if (!items.length) return;
  e.preventDefault();
  for (const it of items) { const f = it.getAsFile(); if (f) pendingAtts.push(await fileToAtt(f)); }
  renderAtts();
});
// chat dictation (native SpeechRecognition)
(() => {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { qs("#chatMic").style.display = "none"; return; }
  const rec = new SR(); rec.interimResults = false; rec.continuous = false; let on = false;
  rec.onresult = (e) => { const tx = e.results[0][0].transcript; chatInput.value += (chatInput.value && !chatInput.value.endsWith(" ") ? " " : "") + tx; chatInput.dispatchEvent(new Event("input")); };
  rec.onend = () => { on = false; qs("#chatMic").classList.remove("rec"); };
  qs("#chatMic").onclick = () => { if (on) { rec.stop(); return; } try { rec.start(); on = true; qs("#chatMic").classList.add("rec"); } catch {} };
})();

// ---- skills + context menu (the "+" sheet) ----
function insertText(t) {
  const m = qs("#vChat").classList.contains("show") ? qs("#chatInput") : qs("#msgInput");
  m.value += (m.value && !m.value.endsWith(" ") ? " " : "") + t + " ";
  m.dispatchEvent(new Event("input")); m.focus(); // triggers the right grow handler
}
const relTo = (base, full) => full.replace(base, "").replace(/^[\\/]/, "") || ".";

function openAdd(tab) { if (!activeSession) return; qs("#dlgAdd").showModal(); switchAddTab(tab || "skills"); }
function switchAddTab(t) {
  const sk = t === "skills";
  qs("#paneSkills").style.display = sk ? "" : "none";
  qs("#paneCtx").style.display = sk ? "none" : "";
  qs("#tabSkills").classList.toggle("on", sk);
  qs("#tabCtx").classList.toggle("on", !sk);
  if (sk) loadSkills(); else ctxLoad(activeSession.cwd);
}
qs("#addBtn").onclick = () => openAdd("skills");
qs("#tabSkills").onclick = () => switchAddTab("skills");
qs("#tabCtx").onclick = () => switchAddTab("ctx");
qs("#addClose").onclick = () => qs("#dlgAdd").close();

// Skills tab
let allSkills = [];
async function loadSkills() {
  allSkills = await api("/skills?agent=" + activeSession.agent + "&cwd=" + encodeURIComponent(activeSession.cwd)).catch(() => []);
  renderSkills();
}
const catIcon = { skill: "✦", builtin: "🧩", plugin: "🔌", mcp: "🛰" };
function renderSkills() {
  const q = qs("#skSearch").value.toLowerCase();
  const l = qs("#skList"); l.innerHTML = "";
  const items = allSkills.filter((s) => (s.name + " " + (s.description || "")).toLowerCase().includes(q));
  if (!items.length) { l.innerHTML = "<div class='pill'>Nothing found</div>"; return; }
  [["skill", "Skills"], ["builtin", "Built-in"], ["plugin", "Plugins"], ["mcp", "MCPs"]].forEach(([cat, label]) => {
    const group = items.filter((s) => (s.category || "skill") === cat);
    if (!group.length) return;
    const h = document.createElement("div"); h.className = "seclabel"; h.textContent = label + " (" + group.length + ")"; l.appendChild(h);
    group.forEach((s) => {
      const d = document.createElement("div");
      d.innerHTML = `<div style="flex:1;min-width:0"><div>${catIcon[cat] || "•"} ${s.name}</div>${s.description ? `<small class="pill">${s.description}</small>` : ""}</div><span class="src">${s.source}</span>`;
      d.onclick = () => { insertText(s.invoke || s.name); qs("#dlgAdd").close(); };
      l.appendChild(d);
    });
  });
}
qs("#skSearch").oninput = renderSkills;

// Context tab (browse folder, add a file or a whole folder as @mention)
let ctxCwd = "";
async function ctxLoad(p) {
  const r = await api("/fs?mode=all&path=" + encodeURIComponent(p));
  ctxCwd = r.path; qs("#ctxCrumb").textContent = r.path;
  const l = qs("#ctxList"); l.innerHTML = "";
  r.entries.forEach((e) => {
    const d = document.createElement("div"); d.textContent = (e.dir ? "📁 " : "📄 ") + e.name;
    d.onclick = () => {
      if (e.dir) ctxLoad(r.path + "/" + e.name);
      else { insertText("@" + relTo(activeSession.cwd, r.path + "/" + e.name)); qs("#dlgAdd").close(); }
    };
    l.appendChild(d);
  });
}
qs("#ctxUp").onclick = () => ctxLoad(ctxCwd.replace(/[\\/][^\\/]+[\\/]?$/, ""));
qs("#ctxAddDir").onclick = () => { insertText("@" + relTo(activeSession.cwd, ctxCwd)); qs("#dlgAdd").close(); };

// ---- new session dialog ----
let nCwd = "";
qs("#btnNew").onclick = async () => {
  agents = await api("/agents");
  qs("#nAgent").innerHTML = Object.keys(agents).map((k) => `<option>${k}</option>`).join("");
  nCwd = ""; await nfsLoad(); qs("#dlgNew").showModal();
};
async function nfsLoad() {
  const r = await api("/fs?path=" + encodeURIComponent(nCwd));
  nCwd = r.path; qs("#nPath").textContent = r.path;
  const l = qs("#fsList"); l.innerHTML = "";
  r.entries.forEach((e) => {
    const div = document.createElement("div"); div.textContent = "📁 " + e.name;
    div.onclick = () => { nCwd = r.path + "/" + e.name; nfsLoad(); };
    l.appendChild(div);
  });
}
qs("#fsUp").onclick = () => { nCwd = nCwd.replace(/[\\/][^\\/]+[\\/]?$/, ""); nfsLoad(); };
qs("#fsMk").onclick = async () => { const name = qs("#fsNew").value.trim(); if (!name) return; const r = await api("/fs", { method: "POST", body: JSON.stringify({ path: nCwd, name }) }); nCwd = r.path; qs("#fsNew").value = ""; nfsLoad(); };
qs("#nCancel").onclick = () => qs("#dlgNew").close();
qs("#nCreate").onclick = async () => {
  const meta = await api("/sessions", { method: "POST", body: JSON.stringify({ name: qs("#nName").value.trim(), agent: qs("#nAgent").value, cwd: nCwd }) });
  qs("#dlgNew").close(); await refresh(); openSession({ ...meta, alive: true });
};

// ---- screen ----
let shotTimer;
function startScreen() { const img = qs("#shot"); const tick = () => img.src = "/screen.jpg?token=" + encodeURIComponent(TOKEN) + "&_=" + Date.now(); tick(); shotTimer = setInterval(tick, 1000); }
function stopScreen() { clearInterval(shotTimer); }

// ---- rustdesk ----
qs("#btnRust").onclick = async () => {
  const r = await api("/rustdesk");
  if (r.id) location.href = "rustdesk://" + r.id; else alert("Set rustdeskId in config.json (and install RustDesk).");
};

// ---- boot ----
(async () => {
  if (!TOKEN) { document.body.innerHTML = "<p style='padding:20px'>Missing ?token=… in the URL.</p>"; return; }
  agents = await api("/agents").catch(() => ({}));
  await refresh();
  setInterval(refresh, 5000); // pick up sessions spawned by the controller
  if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js").catch(() => {});
})();
</script>
</body>
</html>
