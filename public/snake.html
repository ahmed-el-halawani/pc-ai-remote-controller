<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Snake Game</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #0d1117; color: #c9d1d9; font: 14px system-ui, sans-serif; height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  canvas { border: 1px solid #30363d; border-radius: 8px; image-rendering: pixelated; }
  .info { display: flex; gap: 24px; margin: 12px; font-size: 18px; }
  .info span { color: #8b949e; }
  .info b { color: #c9d1d9; }
  button { background: #238636; color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 16px; margin: 8px; }
  #over { display: none; text-align: center; }
  .ctrl { display: grid; grid-template-columns: repeat(3, 52px); gap: 6px; margin-top: 12px; justify-items: center; }
  .ctrl button { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 14px; font-size: 20px; width: 100%; border-radius: 8px; cursor: pointer; }
  .ctrl div { width: 100%; }
  @media (pointer: coarse) { .ctrl { display: grid; } }
  @media (pointer: fine) { .ctrl { display: none; } }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="info">
  <span>Score <b id="score">0</b></span>
  <span>High <b id="high">0</b></span>
</div>
<div id="over">
  <div style="font-size:24px;margin:8px">Game Over</div>
  <button id="restart">Play Again</button>
</div>
<div class="ctrl">
  <div></div><button data-dir="up">▲</button><div></div>
  <button data-dir="left">◀</button><button data-dir="down">▼</button><button data-dir="right">▶</button>
</div>
<script>
  const S = 20, T = 20;
  let canvas, ctx, high, scoreEl, overEl;
  let snake, dir, nextDir, food, score, running, anim;

  function init() {
    canvas = document.getElementById('c');
    canvas.width = S * T; canvas.height = S * T;
    ctx = canvas.getContext('2d');
    scoreEl = document.getElementById('score');
    high = parseInt(localStorage.getItem('snakeHigh') || '0');
    document.getElementById('high').textContent = high;
    overEl = document.getElementById('over');
    document.getElementById('restart').onclick = start;
    document.querySelectorAll('[data-dir]').forEach(b => b.onclick = () => setDir(b.dataset.dir));
    document.addEventListener('keydown', e => {
      if (e.key.startsWith('Arrow')) { e.preventDefault(); setDir(e.key.slice(5).toLowerCase()); }
    });
    start();
  }

  function start() {
    overEl.style.display = 'none';
    snake = [{ x: 10, y: 10 }];
    dir = { x: 1, y: 0 }; nextDir = { x: 1, y: 0 };
    score = 0; scoreEl.textContent = '0';
    running = true;
    spawnFood();
    if (anim) cancelAnimationFrame(anim);
    loop();
  }

  function setDir(d) {
    if (!running) return;
    const m = { up: { x: 0, y: -1 }, down: { x: 0, y: 1 }, left: { x: -1, y: 0 }, right: { x: 1, y: 0 } }[d];
    if (!m || (m.x === -dir.x && m.y === -dir.y)) return;
    nextDir = m;
  }

  function spawnFood() {
    const free = [];
    for (let x = 0; x < T; x++) for (let y = 0; y < T; y++) if (!snake.some(s => s.x === x && s.y === y)) free.push({ x, y });
    if (free.length) food = free[Math.floor(Math.random() * free.length)];
  }

  function loop() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    if (head.x < 0 || head.x >= T || head.y < 0 || head.y >= T || snake.some(s => s.x === head.x && s.y === head.y)) {
      running = false;
      if (score > high) { high = score; localStorage.setItem('snakeHigh', high); document.getElementById('high').textContent = high; }
      overEl.style.display = 'block';
      draw();
      return;
    }
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) { score++; scoreEl.textContent = score; spawnFood(); }
    else snake.pop();
    draw();
    anim = setTimeout(loop, 120);
  }

  function draw() {
    ctx.fillStyle = '#0d1117'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    snake.forEach((s, i) => {
      ctx.fillStyle = i === 0 ? '#238636' : '#2ea043';
      ctx.fillRect(s.x * S, s.y * S, S - 1, S - 1);
    });
    ctx.fillStyle = '#fb6a3c';
    ctx.fillRect(food.x * S, food.y * S, S - 1, S - 1);
  }

  init();
</script>
</body>
</html>
